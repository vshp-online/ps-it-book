name: Build & Deploy (Quarto Book)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "book-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install TeX packages
        run: |
          tlmgr update --self || true
          tlmgr install libertinus-fonts

      - name: Set build metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="main-${GITHUB_SHA::7}"
          fi
          echo "BOOK_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "BOOK_BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "${GITHUB_ENV}"

      - name: Render book
        run: quarto render

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: _book/probability-statistics-for-it-entrepreneurs.pdf

      - name: Prepare versioned PDF
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp _book/probability-statistics-for-it-entrepreneurs.pdf "_book/ps-it-book-${BOOK_VERSION}.pdf"

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p tmp
          awk -v release="${GITHUB_REF_NAME}" '
            index($0, "## " release " ") == 1 { copy = 1; next }
            copy && /^## / { exit }
            copy { print }
          ' CHANGELOG.md > tmp/release-notes.md
          test -s tmp/release-notes.md

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "_book/ps-it-book-${BOOK_VERSION}.pdf" \
            --verify-tag \
            --title "Учебное пособие ${GITHUB_REF_NAME}" \
            --notes-file tmp/release-notes.md

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
